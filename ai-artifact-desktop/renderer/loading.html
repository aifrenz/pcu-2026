<!DOCTYPE html>
<!-- 웹 서비스를 불러오는 동안 잠깐 보여주는 로컬 로딩 화면입니다. -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>불러오는 중</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #ffffff;
        font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      }
      /* 빙글빙글 도는 로딩 표시 */
      .spinner {
        width: 44px;
        height: 44px;
        border: 4px solid #e0e0e0;
        border-top-color: #555555;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .message {
        margin-top: 16px;
        font-size: 16px;
        color: #333333;
      }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <p class="message">앱을 불러오는 중입니다...</p>
  </body>
</html>
